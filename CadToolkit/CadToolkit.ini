# CadToolkit 配置文件
# 说明：
# - 行首为 # 或 ; 的内容是备注，不会被插件执行。
# - 不要随意调整配置项和分组顺序；插件升级时会按固定位置补充新增项，保持顺序便于维护和对比。
# - 修改前建议备份 CadToolkit.ini；升级时不要用 CadToolkit.default.ini 覆盖已有 CadToolkit.ini。
# - true/false 表示开关；多个别名或白名单规则用英文逗号分隔。

# 快捷建块
# QuickBlockPrefix：快捷建块自动命名的前缀，例如 BK 会生成 BK001、BK002。
# DeleteOriginal：快捷建块后是否删除原始对象。true=删除原对象，false=保留原对象。
# KeepOriginal：加下划线时是否保留原单行文字。true=保留，false=转换后删除原文字。
QuickBlockPrefix=BK
DeleteOriginal=true
KeepOriginal=false

# 文字对齐
# AlignHorizontal：文字对齐默认水平方式。0=左对齐，1=居中，2=右对齐。
# AlignUseFirstBase：是否默认使用第一个文字作为对齐基点。true=使用第一个文字，false=手动指定基点。
# AlignLineSpacing：默认行距。0=自动按文字高度估算；大于 0 时使用指定图纸单位。
AlignHorizontal=0
AlignUseFirstBase=true
AlignLineSpacing=0

# 图层管理
# IsoLayerKeepLayer0：孤立图层时是否保留 0 层不冻结。默认 false，表示 0 层也按普通图层处理。
IsoLayerKeepLayer0=false

# 图层规范
# LayerStandardFallbackTo0：图层规范时，未识别且不在白名单的图层是否归到 0 层。默认 false，建议在预览窗口临时勾选。
# LayerStandardWhitelist：图层规范白名单。命中后保持原样，不迁移、不兜底归 0。
# 白名单规则默认全字匹配；需要包含、前缀、后缀匹配时使用 * 通配符，例如 *图框*、A-*、*-OLD。
LayerStandardFallbackTo0=false
LayerStandardWhitelist=0,Defpoints,*图框*,*视口*,*原有*,*新增*

# 文字规范
# TextStyleFallbackToStandard：文字规范时，未识别且不在白名单的文字样式是否归到 TextStyleFallbackStyle。
# TextStyleFallbackStyle：未识别文字样式的兜底目标样式，必须在 [TextStyleStandard] 中存在。
# TextStyleWhitelist：文字样式白名单。命中后保持原样；支持 * 通配符。
# TextStyleNormalizeHeight：归并文字样式时是否同步固定字高。
# TextStyleNormalizeWidthFactor：归并文字样式时是否同步宽度因子。
# TextStyleNormalizeOblique：归并文字样式时是否同步倾斜角。
# TextStyleNormalizeColorByLayer：归并文字样式时是否把文字颜色改为 ByLayer。
# TextStyleDeleteUnusedOldStyles：执行后是否删除已不再使用的旧文字样式。建议确认备份后再开启。
TextStyleFallbackToStandard=false
TextStyleFallbackStyle=STANDARD-TEXT
TextStyleWhitelist=Standard,Annotative,*DIM*
TextStyleNormalizeHeight=false
TextStyleNormalizeWidthFactor=false
TextStyleNormalizeOblique=false
TextStyleNormalizeColorByLayer=false
TextStyleDeleteUnusedOldStyles=false

# 命令列表
# 格式：显示名称=CAD命令
# 面板会按下面的顺序显示命令；# 文字编辑 / # 图层管理 这类行会作为面板分组标题。
# 可以新增自定义命令，但不要随意调整内置分组顺序；如需隐藏命令，建议先在行首加 ; 备注。

[Commands]
# 文字编辑
查找替换=CT_FINDREPLACE
文字对齐=CT_ALIGN
加下划线=CT_UNDERLINE
格式复制=CT_TEXTBRUSH
文字合并=CT_TEXTMERGE
文字编号=CT_TEXTNUMBER
文字规范=CT_TEXTSTYLESTANDARD
# 图层管理
图层归零=CT_SETLAYER0
图层规范=CT_LAYERSTANDARD
孤立图层=CT_ISOLAYER
按层选择=CT_SELECTBYLAYER
按色选择=CT_SELECTBYCOLOR
# 图块操作
重命名块=CT_RENAMEBLOCK
快捷建块=CT_QUICKBLOCK
改块基点=CT_CHANGEBASEPOINT
按块选择=CT_SELECTBYBLOCK
# 绘图标注
画中心线=CT_CENTERLINE
快速标注=CT_QUICKDIM
递增复制=CT_INCCOPY
Z轴归零=CT_FLATTEN

[LayerStandard]
# 图层标准
# 格式：标准图层=颜色|线型|线宽|是否打印
# 颜色使用 CAD ACI 颜色号，例如 1=红、2=黄、3=绿、4=青、7=白/黑。
# 线型填写 CAD 线型名，例如 CONTINUOUS、CENTER、HIDDEN；缺失线型会尝试从 CAD 自带 lin 文件加载。
# 线宽填写 Default 或毫米数值，例如 0.25；是否打印填写 true/false。
# [LayerMap] 的左侧必须对应这里的标准图层名；不要随意改变标准图层顺序，便于预览和维护。
0-设备层=4|CONTINUOUS|Default|true
1-中心线层=1|CENTER|Default|true
2-虚线层=4|HIDDEN|Default|true
3-文字层=3|CONTINUOUS|Default|true
4-标注层=3|CONTINUOUS|Default|true
5-风网=200|CONTINUOUS|Default|true
6-溜管=2|CONTINUOUS|Default|true
7-洞孔=6|CONTINUOUS|Default|true
8-受力点=4|CONTINUOUS|Default|true
9-建筑=7|CONTINUOUS|Default|true
10-非标=31|CONTINUOUS|Default|true
11-填充=8|CONTINUOUS|Default|true

[LayerMap]
# 图层映射
# 格式：标准图层=旧图层别名1,旧图层别名2,旧图层别名3
# 别名默认全字匹配；需要包含、前缀、后缀匹配时使用 * 通配符。
# 示例：0-4 只匹配完整图层名 0-4；*设备* 匹配名称中包含“设备”的图层；A-* 匹配 A- 开头。
# 左侧标准图层名必须已在 [LayerStandard] 中定义；建议保持顺序与 [LayerStandard] 一致。
0-设备层=*设备*,0-4,*VIS*
1-中心线层=*中心*,*中心线*,*CENTER*,0-1,1,*AXIS*,*CLEARANCE*,ZX,ZXX
2-虚线层=*虚线*,*HIDDEN,*DASH,*HID
3-文字层=*文字*,*说明*,*编号*,*TEXT,*txt
4-标注层=*标注*,*尺寸*,*DIM*,*dim*
5-风网=*风网*,*风管*,*风道*,0-5,FW
6-溜管=*溜管*,*压运*,*VIS5
7-洞孔=*洞口*,*洞孔*,*开洞*
8-受力点=*受力*,*受力点*,*吊点*
9-建筑=*建筑*,*ARCH,*WALL
10-非标=*非标*,*非标准*
11-填充=*填充*,*HATCH,*PAT

[TextStyleStandard]
# 文字样式标准
# 格式：标准样式=字体文件|大字体文件|固定字高|宽度因子|倾斜角
# 字体文件可填 shx 或系统字体名；没有大字体时留空，例如 TITLE-TEXT=黑体||0|1.0|0。
# 固定字高为 0 表示不强制固定高度；宽度因子通常为 1.0；倾斜角通常为 0。
# [TextStyleMap] 的左侧必须对应这里的标准样式名；不要随意改变标准样式顺序，便于预览和维护。
STANDARD-TEXT=gbenor.shx|gbcbig.shx|0|1.0|0
TITLE-TEXT=黑体||0|1.0|0

[TextStyleMap]
# 文字样式映射
# 格式：标准样式=旧样式别名1,旧样式别名2,旧样式别名3
# 别名默认全字匹配；需要包含、前缀、后缀匹配时使用 * 通配符。
# 左侧标准样式名必须已在 [TextStyleStandard] 中定义；建议保持顺序与 [TextStyleStandard] 一致。
STANDARD-TEXT=Standard,txt,*宋体*,HZTXT
TITLE-TEXT=*标题*,TITLE
