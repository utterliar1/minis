name: Build & Release

on:
  push:
    tags: ['bb-v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Compile CAD API stubs
        shell: pwsh
        run: |
          $ws = "${{ github.workspace }}"
          $stubs = "$ws\.github\stubs"
          $outDir = "$ws\stubs"
          New-Item -ItemType Directory -Path "$outDir\gcad","$outDir\zwcad","$outDir\acad" -Force | Out-Null

          # GstarCAD
          dotnet build "$stubs\GstarCAD.csproj" -c Release --nologo -v quiet -o "$outDir\gcad"
          Copy-Item "$outDir\gcad\gmdb.dll" "$outDir\gcad\gmap.dll" -Force
          Write-Host "GstarCAD stubs OK"

          # ZWCAD
          dotnet build "$stubs\ZWCAD.csproj" -c Release --nologo -v quiet -o "$outDir\zwcad"
          Copy-Item "$outDir\zwcad\ZwDatabaseMgd.dll" "$outDir\zwcad\ZwManaged.dll" -Force
          Write-Host "ZWCAD stubs OK"

          # AutoCAD
          dotnet build "$stubs\AutoCAD.csproj" -c Release --nologo -v quiet -o "$outDir\acad"
          Copy-Item "$outDir\acad\acdbmgd.dll" "$outDir\acad\acmgd.dll" -Force
          Copy-Item "$outDir\acad\acdbmgd.dll" "$outDir\acad\accoremgd.dll" -Force
          Write-Host "AutoCAD stubs OK"

      - name: Build GstarCAD
        shell: pwsh
        run: |
          $msbuild = "C:\Windows\Microsoft.NET\Framework64\v4.0.30319\MSBuild.exe"
          $src = "${{ github.workspace }}\BlockBrowser"
          $stubs = "${{ github.workspace }}\stubs\gcad"
          & $msbuild "$src\BlockBrowser.csproj" `
            /p:Configuration=Release /p:Platform=x64 `
            "/p:GstarCADDir=$stubs" `
            /p:OutputPath="bin\Release\gcad\" `
            /t:Rebuild /v:minimal

      - name: Build ZWCAD
        shell: pwsh
        run: |
          $msbuild = "C:\Windows\Microsoft.NET\Framework64\v4.0.30319\MSBuild.exe"
          $src = "${{ github.workspace }}\BlockBrowser"
          $stubs = "${{ github.workspace }}\stubs\zwcad"
          & $msbuild "$src\BlockBrowser.ZWCAD.csproj" `
            /p:Configuration=Release /p:Platform=x64 `
            "/p:ZWCADDir=$stubs" `
            /p:OutputPath="bin\Release\zwcad\" `
            /t:Rebuild /v:minimal

      - name: Build AutoCAD
        shell: pwsh
        run: |
          $src = "${{ github.workspace }}\BlockBrowser"
          $acadDir = "${{ github.workspace }}\stubs\acad"
          $csproj = Get-Content "$src\BlockBrowser.AutoCAD8.csproj" -Raw
          $csproj = $csproj.Replace('C:\Program Files\Autodesk\AutoCAD 2026', $acadDir)
          Set-Content "$src\BlockBrowser.AutoCAD8.csproj" -Value $csproj -Encoding UTF8
          dotnet build "$src\BlockBrowser.AutoCAD8.csproj" -c Release -o "$src\bin\Release\acad\" --nologo --no-incremental

      - name: Package
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag -replace '^bb-v',''
          $SRC = "${{ github.workspace }}\BlockBrowser"
          $out = "${{ github.workspace }}\release"
          $pkg = "$out\BlockBrowser-$ver"
          New-Item -ItemType Directory -Path $pkg -Force | Out-Null

          foreach ($plat in @("gcad","acad","zwcad")) {
            $dll = "$SRC\bin\Release\$plat\BlockBrowser.dll"
            if (Test-Path $dll) {
              New-Item -ItemType Directory -Path "$pkg\$plat" -Force | Out-Null
              Copy-Item $dll "$pkg\$plat\"
              Write-Host "OK: $plat\BlockBrowser.dll"
            } else {
              Write-Host "MISSING: $plat\BlockBrowser.dll"
            }
          }

          Copy-Item "$SRC\autoload.lsp" "$pkg\" -ErrorAction SilentlyContinue
          Copy-Item "$SRC\config.ini" "$pkg\" -ErrorAction SilentlyContinue

          $zip = "$out\BlockBrowser-$ver.zip"
          Compress-Archive -Path "$pkg\*" -DestinationPath $zip -Force
          Write-Host "Packed: $zip ($([math]::Round((Get-Item $zip).Length/1024, 1)) KB)"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "BlockBrowser ${{ github.ref_name }}"
          generate_release_notes: false
          files: ${{ github.workspace }}/release/BlockBrowser-${{ github.ref_name }}.zip
          body: |
            ## BlockBrowser ${{ github.ref_name }}

            CAD 平台块浏览器插件，支持浩辰CAD、AutoCAD、中望CAD。

            ### 安装
            1. 解压到任意目录（如 `C:\BlockBrowser`）
            2. CAD 中执行 `APPLOAD` → 加载 `autoload.lsp`
            3. 输入 `BB` 打开块浏览器

            ### 包含
            | 平台 | 文件 |
            |------|------|
            | 浩辰CAD | `gcad/BlockBrowser.dll` |
            | AutoCAD | `acad/BlockBrowser.dll` |
            | 中望CAD | `zwcad/BlockBrowser.dll` |

            ### 命令
            | 命令 | 功能 |
            |------|------|
            | `BB` | 打开块浏览器 |
            | `BBADD` | 添加选中对象到库 |
            | `BBEXPORT` | 导出当前图纸块到库 |
            | `BBTHUMB` | 清除缩略图缓存 |
            | `BBINFO` | 显示版本信息 |
