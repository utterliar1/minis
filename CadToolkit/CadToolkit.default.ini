# CadToolkit 配置文件
# 快捷建块
QuickBlockPrefix=BK
DeleteOriginal=true
KeepOriginal=false

# 文字对齐
AlignHorizontal=0
AlignUseFirstBase=true
AlignLineSpacing=0

# 图层管理
IsoLayerKeepLayer0=false

# 图层规范
LayerStandardFallbackTo0=false
LayerStandardWhitelist=0,Defpoints,*图框*,*视口*,*原有*,*新增*

# 命令列表 - 格式: 显示名称=CAD命令
# 可自由增减、调整顺序

[Commands]
# 文字编辑
查找替换=CT_FINDREPLACE
文字对齐=CT_ALIGN
加下划线=CT_UNDERLINE
格式复制=CT_TEXTBRUSH
文字合并=CT_TEXTMERGE
文字编号=CT_TEXTNUMBER
# 图层管理
图层归零=CT_SETLAYER0
图层规范=CT_LAYERSTANDARD
孤立图层=CT_ISOLAYER
按层选择=CT_SELECTBYLAYER
按色选择=CT_SELECTBYCOLOR
# 图块操作
重命名块=CT_RENAMEBLOCK
快捷建块=CT_QUICKBLOCK
改块基点=CT_CHANGEBASEPOINT
按块选择=CT_SELECTBYBLOCK
# 绘图标注
画中心线=CT_CENTERLINE
快速标注=CT_QUICKDIM
递增复制=CT_INCCOPY
Z轴归零=CT_FLATTEN

[LayerStandard]
0-设备层=4|CONTINUOUS|Default|true
1-中心线层=1|CENTER|Default|true
2-虚线层=4|HIDDEN|Default|true
3-文字层=3|CONTINUOUS|Default|true
4-标注层=3|CONTINUOUS|Default|true
5-风网=200|CONTINUOUS|Default|true
6-溜管=2|CONTINUOUS|Default|true
7-洞孔=6|CONTINUOUS|Default|true
8-受力点=4|CONTINUOUS|Default|true
9-建筑=7|CONTINUOUS|Default|true
10-非标=31|CONTINUOUS|Default|true
11-填充=8|CONTINUOUS|Default|true

[LayerMap]
0-设备层=*设备*,0-4,*VIS*
1-中心线层=*中心*,*中心线*,CENTER,0-1,1,AXIS,CLEARANCE
2-虚线层=*虚线*,HIDDEN,DASH,HID
3-文字层=*文字*,*说明*,*编号*,TEXT,txt
4-标注层=*标注*,*尺寸*,DIM,dim
5-风网=*风网*,*风管*,*风道*,0-5
6-溜管=*溜管*,*压运*,VIS5
7-洞孔=*洞口*,*洞孔*,*开洞*
8-受力点=*受力*,*受力点*,*吊点*
9-建筑=*建筑*,ARCH
10-非标=*非标*,*非标准*
11-填充=*填充*,HATCH,PAT
