name: Release BlockBrowser

on:
  push:
    tags:
      - 'bb-v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag -replace '^bb-v',''
          $SRC = "${{ github.workspace }}\BlockBrowser"
          $releaseDir = "${{ github.workspace }}\release\BlockBrowser-$ver"
          
          New-Item -ItemType Directory -Path $releaseDir -Force | Out-Null
          
          # DLL 目录（预留，如果已有编译好的 DLL 则自动包含）
          foreach ($plat in @("gcad","acad","zwcad")) {
            if (Test-Path "$SRC\$plat\BlockBrowser.dll") {
              New-Item -ItemType Directory -Path "$releaseDir\$plat" -Force | Out-Null
              Copy-Item "$SRC\$plat\BlockBrowser.dll" "$releaseDir\$plat/"
              Write-Host "Included: $plat\BlockBrowser.dll"
            }
          }
          
          # 源码 + 配置
          @(
            "BlockBrowserPlugin.cs","BlockBrowserForm.cs","BlockThumbnailCard.cs",
            "BlockBrowser.csproj","BlockBrowser.AutoCAD8.csproj","BlockBrowser.ZWCAD.csproj",
            "autoload.lsp","build-all.bat","config.ini","README.md"
          ) | ForEach-Object {
            if (Test-Path "$SRC\$_") { Copy-Item "$SRC\$_" $releaseDir/ }
          }
          
          Copy-Item "$SRC\Properties" "$releaseDir\Properties" -Recurse -ErrorAction SilentlyContinue
          
          $manual = Get-ChildItem "$SRC\使用手册*" -ErrorAction SilentlyContinue
          if ($manual) { Copy-Item $manual.FullName $releaseDir/ }
          
          # 默认块库目录
          $libDir = "$releaseDir\我的常用块"
          @("常用","电气","建筑","机械","标注","其他") | ForEach-Object {
            New-Item -ItemType Directory -Path "$libDir\$_" -Force | Out-Null
          }
          
          Compress-Archive -Path $releaseDir -DestinationPath "${{ github.workspace }}\release\BlockBrowser-$ver.zip"
          $size = (Get-Item "${{ github.workspace }}\release\BlockBrowser-$ver.zip").Length
          Write-Host "Packed: BlockBrowser-$ver.zip ($([math]::Round($size/1024, 1)) KB)"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "BlockBrowser ${{ github.ref_name }}"
          generate_release_notes: false
          files: ${{ github.workspace }}\release\BlockBrowser-${{ github.ref_name }}.zip
          body: |
            ## BlockBrowser ${{ github.ref_name }}
            
            多 CAD 平台块浏览器插件，支持浩辰CAD、AutoCAD、中望CAD。
            
            ### 安装
            1. 解压到任意目录（如 `C:\BlockBrowser`）
            2. CAD 中执行 `APPLOAD` → 加载 `autoload.lsp`
            3. 输入 `BB` 打开块浏览器
            
            ### 从源码构建
            需要 .NET Framework 4.8 SDK + .NET 8 SDK + 对应 CAD 软件
            
            ```bat
            :: 修改 build-all.bat 中的 CAD 安装路径
            build-all.bat
            ```
            
            ### 包含
            | 目标 | 文件 |
            |------|------|
            | 浩辰CAD | `gcad\BlockBrowser.dll` |
            | AutoCAD 2026 | `acad\BlockBrowser.dll` |
            | 中望CAD | `zwcad\BlockBrowser.dll` |
