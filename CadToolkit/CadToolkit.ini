# CadToolkit 配置文件
Version=v1.22

# 快捷建块
QuickBlockPrefix=BK
DeleteOriginal=true
KeepOriginal=false

# 命令列表 - 格式: 显示名称=CAD命令
# 可自由增减、调整顺序

[Commands]
# 文字编辑
查找替换=CT_FINDREPLACE
文字对齐=CT_ALIGN
加下划线=CT_UNDERLINE
格式复制=CT_TEXTBRUSH
文字合并=CT_TEXTMERGE
文字编号=CT_TEXTNUMBER
# 图层管理
图层归零=CT_SETLAYER0
孤立图层=CT_ISOLAYER
按层选择=CT_SELECTBYLAYER
按色选择=CT_SELECTBYCOLOR
按块选择=CT_SELECTBYBLOCK
# 图块操作
重命名块=CT_RENAMEBLOCK
快捷建块=CT_QUICKBLOCK
# 绘图标注
画中心线=CT_CENTERLINE
快速标注=CT_QUICKDIM
递增复制=CT_INCCOPY
Z轴归零=CT_FLATTEN

