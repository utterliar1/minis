name: CadToolkit Build & Release

on:
  push:
    tags: ['ct-v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Compile CAD API stubs
        shell: pwsh
        run: |
          $ws = "${{ github.workspace }}"
          $stubs = "$ws\.github\stubs"
          $outDir = "$ws\stubs"
          New-Item -ItemType Directory -Path "$outDir\gcad","$outDir\zwcad","$outDir\acad" -Force | Out-Null

          dotnet build "$stubs\GstarCAD.csproj" -c Release --nologo -v quiet -o "$outDir\gcad"
          Copy-Item "$outDir\gcad\gmdb.dll" "$outDir\gcad\gmap.dll" -Force
          Write-Host "GstarCAD stubs OK"

          dotnet build "$stubs\ZWCAD.csproj" -c Release --nologo -v quiet -o "$outDir\zwcad"
          Copy-Item "$outDir\zwcad\ZwDatabaseMgd.dll" "$outDir\zwcad\ZwManaged.dll" -Force
          Write-Host "ZWCAD stubs OK"

          dotnet build "$stubs\AutoCAD.csproj" -c Release --nologo -v quiet -o "$outDir\acad"
          Copy-Item "$outDir\acad\acdbmgd.dll" "$outDir\acad\acmgd.dll" -Force
          Copy-Item "$outDir\acad\acdbmgd.dll" "$outDir\acad\accoremgd.dll" -Force
          Write-Host "AutoCAD stubs OK"

      - name: Build All Platforms
        shell: pwsh
        run: |
          $msbuild = "C:\Windows\Microsoft.NET\Framework64\v4.0.30319\MSBuild.exe"
          $src = "${{ github.workspace }}\CadToolkit\src"
          $stubs = "${{ github.workspace }}\stubs"
          $out = "${{ github.workspace }}\out"

          # Build shared libs once
          & $msbuild "$src\CadToolkit.Core\CadToolkit.Core.csproj" /p:Configuration=Release /p:Platform=x64 /t:Rebuild /v:minimal
          & $msbuild "$src\CadToolkit.UI\CadToolkit.UI.csproj" /p:Configuration=Release /p:Platform=x64 /t:Rebuild /v:minimal

          # Build each platform to separate output dir
          foreach ($plat in @("GstarCAD","ZWCAD","AutoCAD")) {
            $platKey = $plat
            if ($plat -eq "GstarCAD") { $platKey = "GstarCADDir" }
            elseif ($plat -eq "ZWCAD") { $platKey = "ZWCADDir" }
            elseif ($plat -eq "AutoCAD") { $platKey = "AutoCADDir" }

            $stubDir = "$stubs\$(($plat -eq 'GstarCAD') ? 'gcad' : ($plat -eq 'ZWCAD') ? 'zwcad' : 'acad')"
            $outDir = "$out\$(($plat -eq 'GstarCAD') ? 'gcad' : ($plat -eq 'ZWCAD') ? 'zwcad' : 'acad')"
            New-Item -ItemType Directory -Path $outDir -Force | Out-Null

            Remove-Item "$src\CadToolkit\bin\Release" -Recurse -Force -ErrorAction SilentlyContinue
            & $msbuild "$src\CadToolkit\CadToolkit.$plat.csproj" /p:Configuration=Release /p:Platform=x64 "/p:$platKey=$stubDir" /t:Rebuild /v:minimal

            Copy-Item "$src\CadToolkit\bin\Release\CadToolkit.dll" "$outDir\" -Force
            Copy-Item "$src\CadToolkit.Core\bin\Release\CadToolkit.Core.dll" "$outDir\" -Force
            Copy-Item "$src\CadToolkit.UI\bin\Release\CadToolkit.UI.dll" "$outDir\" -Force
            Write-Host "OK: $plat -> $outDir"
          }

      - name: Package
        id: package
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag -replace '^ct-v',''
          $out = "${{ github.workspace }}\out"
          $pkg = "${{ github.workspace }}\release\CadToolkit"
          New-Item -ItemType Directory -Path $pkg -Force | Out-Null

          foreach ($plat in @("gcad","zwcad","acad")) {
            $src = "$out\$plat"
            if (Test-Path "$src\CadToolkit.dll") {
              New-Item -ItemType Directory -Path "$pkg\$plat" -Force | Out-Null
              Copy-Item "$src\*" "$pkg\$plat\"
              Write-Host "OK: $plat"
            } else {
              Write-Host "MISSING: $plat"
            }
          }

          $autoload = Get-Content "${{ github.workspace }}\CadToolkit\autoload.lsp" -Raw
          $autoload = $autoload -replace 'CadToolkit v[0-9.]+ ready', "CadToolkit v$ver ready"
          $utf8NoBom = New-Object System.Text.UTF8Encoding($false)
          [System.IO.File]::WriteAllText("$pkg\autoload.lsp", $autoload, $utf8NoBom)
          Copy-Item "${{ github.workspace }}\CadToolkit\CadToolkit.default.ini" "$pkg\"
          Copy-Item "${{ github.workspace }}\CadToolkit\CadToolkit使用手册.html" "$pkg\"
          New-Item -ItemType Directory -Force "$pkg\tools" | Out-Null
          Copy-Item "${{ github.workspace }}\CadToolkit\tools\check-config.ps1" "$pkg\tools\"

          $zip = "${{ github.workspace }}\release\CadToolkit-v$ver.zip"
          Compress-Archive -Path "$pkg\*" -DestinationPath $zip -Force
          Write-Host "Packed: $zip"
          "zip=$zip" >> $env:GITHUB_OUTPUT
          "version=$ver" >> $env:GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "CadToolkit v${{ steps.package.outputs.version }}"
          generate_release_notes: false
          files: ${{ steps.package.outputs.zip }}
          body: |
            ## CadToolkit ${{ github.ref_name }}

            AutoCAD / ZWCAD / GstarCAD 三平台通用插件工具箱。

            ### 安装
            1. 解压到 `C:\CadToolkit`
            2. CAD 中执行 `(load "C:/CadToolkit/autoload.lsp")`
            3. 输入 `CC` 打开工具面板
            4. 首次启动会自动创建 `CadToolkit.ini`；升级时不要覆盖已有配置

            ### 包含
            | 平台 | 文件 |
            |------|------|
            | GstarCAD | `gcad/CadToolkit.dll` |
            | ZWCAD | `zwcad/CadToolkit.dll` |
            | AutoCAD | `acad/CadToolkit.dll` |

            ### 命令
            | 命令 | 功能 |
            |------|------|
            | `CC` | 打开工具面板 |
