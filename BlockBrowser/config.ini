# BlockBrowser 配置文件
# 提醒：不要随意改变配置项顺序。程序升级会按这个顺序补齐缺失项，也方便同事排查问题。

# LibraryPath：当前实际使用的图库路径。通常由 CurrentLibraryMode 自动指向 NAS 或本地副本。
LibraryPath=我的常用块

# NasLibraryPath：NAS 主图库路径。普通同事一般只读；指定维护人确认后才写入。
NasLibraryPath=我的常用块

# LocalMirrorPath：NAS 图库的本地副本路径。出差或 NAS 不可用时优先使用这里。
LocalMirrorPath=我的常用块

# ProtectedLocalCategories：本地保护分类白名单，多个分类用英文分号 ; 分隔；这些分类不会被 NAS 更新覆盖或删除。
ProtectedLocalCategories=个人块

# PreferLocalWhenNasUnavailable：Auto 模式下 NAS 不可访问时是否自动使用本地副本。1=启用，0=禁用。
PreferLocalWhenNasUnavailable=1

# AllowNasSync：是否允许本机把本地变更同步到 NAS。0=只读，1=允许写入 NAS。
AllowNasSync=0

# CurrentLibraryMode：图库模式。Local=使用本地副本，Nas=直接使用 NAS，Auto=NAS 可用时用 NAS、不可用时用本地副本。
CurrentLibraryMode=Local

# UserName：同步记录里的用户名；留空时程序可使用系统用户名。
UserName=

# ThumbSize：缩略图尺寸，单位像素；建议 96-192，默认 128。
ThumbSize=128

# InsertScale：插入块默认比例；可在工具栏“插入设置”里修改。
InsertScale=1

# InsertRotation：插入块默认旋转角度，单位为度；可在工具栏“插入设置”里修改。
InsertRotation=0

# FormWidth：BB 面板默认宽度；程序会结合屏幕工作区限制实际大小。
FormWidth=1000

# FormHeight：BB 面板默认高度；程序会结合屏幕工作区限制实际大小。
FormHeight=650
